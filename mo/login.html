
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="user-scalable=no, initial-scale=1.0,maximum-scale=1.0, minimum-scale=1.0, width=device-width" />
    <title>CGV</title>
    <link href="css/font.css" rel="stylesheet" />
    <link href="css/reset.css" rel="stylesheet" />
    <link href="css/login.css" rel="stylesheet" />
    <link href="css/swiper.css" rel="stylesheet" />
</head>
<body>
    <header>
        <div class="head">
            <div class="head__menu"><img src="image/menuBtn.png" alt="메뉴버튼"></div>
            <div class="head__title">로그인</div>
        </div>
        <!-- // head -->
    </header>
    <main class="main">
        <!--<h1 class="logo"><img src="image/logo.png" alt="로고이미지"></h1>-->
        <section class="inputbox">
            <div class="inputbox__id">
                <input type="text" name="id" placeholder="CJ ONE 통합 아이디 6~12자">
                <label for="id"></label>
            </div>
            <!--inputbox__id-->
            <div class="inputbox__pw">
                <input type="text" name="pw" placeholder="영문+숫자+특수문자 6~12자">
                <label for="pw"></label>
            </div>
            <!--inputbox__id-->
            <div class="inputbox__check">
                <input type="checkbox" name="checkbox">
                <label for="checkbox"></label>
                <span>아이디저장</span>
            </div>
            <!-- //inputbox__check -->
            <button type="button" onclick="location.href='#'" class="inputbox__btn">로그인</button>
        </section>
        <!-- // inputbox -->
        <ul class="login-search">
            <li><a href="#">아이디찾기</a></li>
            <li><a href="#">비밀번호찾기</a></li>
            <li><a href="#">회원가입</a></li>
        </ul>
        <!-- //login-search -->
        <div class="login-btn">
            
        </div>
        <!-- //login-btn -->
    </main>
    <footer>
        <ul class="foot-nav">
            <li class="foot-nav__menu"><a href="#">공지사항</a></li>
            <li class="foot-nav__menu"><a href="#">고객센터</a></li>
            <li class="foot-nav__menu"><a href="#">로그인</a></li>
            <li class="foot-nav__menu"><a href="#">PC버전</a></li>
        </ul>
    </footer>
<script src="js/jquery-3.5.1.js"></script>
<script src="js/swiper.js"></script>
<script src="js/script.js"></script>
</html>
